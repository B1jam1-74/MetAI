services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - api
    restart: unless-stopped
